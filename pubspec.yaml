name: green_diary
description: "감성 디지털 화분 키우기 - 일기/메모를 쓰면 숲이 되는 앱"
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.4.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  # 상태관리
  provider: ^6.1.2
  # 로컬 저장소
  shared_preferences: ^2.3.2
  hive: ^2.2.3
  hive_flutter: ^1.1.0
  # 파티클 & 애니메이션
  flutter_animate: ^4.5.0
  lottie: ^3.1.2
  # 날짜/시간
  intl: ^0.19.0
  # 아이콘
  cupertino_icons: ^1.0.8
  # ID 생성
  uuid: ^4.4.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0
  hive_generator: ^2.0.1
  build_runner: ^2.4.12

flutter:
  uses-material-design: true
  assets:
    - assets/images/
    - assets/sounds/
